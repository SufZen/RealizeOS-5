name: RealizeOS
systems:
- key: consulting
  name: RealizeOS
  directory: systems/my-business-1
  routing:
    content:
    - writer
    - reviewer
    strategy:
    - analyst
    - orchestrator
    research:
    - analyst
    general:
    - orchestrator
  agent_routing:
    writer:
    - write
    - draft
    - post
    - article
    - newsletter
    - blog
    - content
    - proposal
    - report
    analyst:
    - analyze
    - research
    - compare
    - evaluate
    - market
    - competitor
    - data
    - trend
    - strategy
    reviewer:
    - review
    - check
    - proofread
    - quality
    - feedback
    - approve
    orchestrator:
    - plan
    - help
    - think
    - advise
    - prioritize
example_tasks:
- Draft a client proposal from meeting notes
- Research competitors for a new engagement
- Write weekly LinkedIn thought leadership posts
- Prepare a quarterly business review report
- Summarize market intelligence into a briefing
- Create a client onboarding email sequence
- Turn workshop notes into a structured framework document
features:
  review_pipeline: true
  auto_memory: true
  skills_v2: true
  activity_log: true
  agent_lifecycle: true
  heartbeats: true
  proactive_mode: true
llm:
  default_model: claude-sonnet
  routing:
    simple: gemini-flash
    content: claude-sonnet
    strategy: claude-sonnet
    complex: claude-opus
developer_mode:
  enabled: false
  tools: [claude_desktop, claude_code_cli, gemini_cli, antigravity, vscode, cursor, windsurf, codex, aider]
  protection_level: standard   # strict | standard | relaxed
  auto_snapshot: true
  cost_optimization:
    use_local_models: false
    review_with: gemini-flash
    cache_embeddings: true
channels:
- type: api
  port: 8080
