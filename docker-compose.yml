# =============================================================================
# RealizeOS 5 — Docker Compose Configuration
# =============================================================================
# Named volumes for persistent data, config, systems, and shared KB.
# All user-editable content is volume-mounted — rebuild without data loss.
# =============================================================================

services:
  api:
    image: ghcr.io/sufzen/realizeos:${REALIZE_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_GWS: "${INSTALL_GWS:-false}"
    container_name: realizeos-api
    ports:
      - "${REALIZE_PORT:-8080}:8080"
    volumes:
      # Named volumes for persistent storage
      - realize-data:/app/data                           # SQLite database persistence
      - realize-shared:/app/shared                       # Shared KB content across ventures
      # Bind mounts for user-editable config
      - ./realize-os.yaml:/app/realize-os.yaml:ro        # System configuration (read-only)
      - ./systems:/app/systems                           # Venture-specific FABRIC directories
      - ./.credentials:/app/.credentials:ro              # Google OAuth (optional, read-only)
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - KB_PATH=/app
      - REALIZE_HOST=0.0.0.0
      - REALIZE_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ---------------------------------------------------------------------------
  # Optional: Telegram bot (uncomment to enable)
  # ---------------------------------------------------------------------------
