# Developer Mode Configuration
# Protection levels: strict | standard | relaxed

protection_levels:
  strict:
    description: "All core + config files read-only to AI tools"
    protected:
      - realize_core/
      - realize_api/
      - realize-os.yaml
      - .env
      - .credentials/
      - cli.py
    guarded:
      - dashboard/src/
      - A-agents/
      - R-routines/
      - templates/
    open:
      - extensions/
      - systems/
      - docs/
      - tests/

  standard:
    description: "Core engine protected, config editable with auto-backup"
    protected:
      - realize_core/prompt/
      - realize_core/llm/
      - realize_core/security/
      - realize_core/db/
      - realize_core/base_handler.py
      - realize_core/config.py
      - .env
      - .credentials/
    guarded:
      - realize_core/
      - realize_api/
      - realize-os.yaml
      - cli.py
      - dashboard/src/
      - A-agents/
      - R-routines/
    open:
      - extensions/
      - systems/
      - docs/
      - tests/
      - templates/

  relaxed:
    description: "Only security/db files protected, everything else open"
    protected:
      - realize_core/security/
      - realize_core/db/
      - .env
      - .credentials/
    guarded:
      - realize_core/prompt/
      - realize_core/llm/
      - realize_core/base_handler.py
    open:
      - realize_core/
      - realize_api/
      - dashboard/
      - extensions/
      - systems/
      - docs/
      - tests/
      - templates/

# Supported AI tools
tools:
  claude_desktop:
    name: "Claude Desktop"
    context_file: "CLAUDE.md"
    permissions_file: ".claude/settings.local.json"
  claude_code_cli:
