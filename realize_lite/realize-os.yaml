# To add more systems: copy a block above, uncomment it, and update the key, name, directory, and description.
# Or simply ask: "Create a new venture" and the AI will set it up for you.

# Shared resources (applies to all systems)
shared:
  identity: shared/identity.md
  preferences: shared/user-preferences.md
  methods: shared/methods/

# Features (toggle on/off)
features:
  review_pipeline: true     # Require reviewer approval for publishable content
  auto_memory: true         # Automatically log learnings to I-insights/
  proactive_mode: true      # AI suggests next steps and asks clarifying questions
  cross_system: false       # Enable cross-system context (for multi-system setups)
