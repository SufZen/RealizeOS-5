# RealizeOS Configuration
# This file defines your systems, agents, and preferences.
# Edit this file to customize your AI operations setup.

# Your workspace name
name: "My Workspace"

# Systems — each system represents a business, project, or domain
# Your workspace supports multiple ventures out of the box.
# Uncomment additional systems when you're ready to use them.
systems:
  - key: my-business-1                    # Unique identifier (lowercase, no spaces)
    name: "My Business 1"                 # Display name
    directory: systems/my-business-1      # Path to the FABRIC directory
    description: "First venture"

    # Agent routing — which agents handle which request types
    routing:
      content: [writer, reviewer]       # Content requests → Writer then Reviewer
      strategy: [analyst, orchestrator] # Strategy requests → Analyst then Orchestrator
      research: [analyst]               # Research → Analyst
      general: [orchestrator]           # Everything else → Orchestrator

