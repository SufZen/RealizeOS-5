# CI Pipeline — RealizeOS 5
# Triggers on push/PR to main
# Steps: lint (ruff) → test (pytest) → security scan → Docker build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    # Called by release.yml to run CI checks before releasing

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # for CodeQL / sarif uploads

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Python Lint (ruff)
  # ──────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check realize_core/ realize_api/ tests/ cli.py

      - name: Run ruff format check
        run: ruff format --check realize_core/ realize_api/ tests/ cli.py

  # ──────────────────────────────────────────────
  # Job 2: Python Tests (pytest)
  # ──────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        env:
          # Prevent tests from hitting real LLM APIs
          ANTHROPIC_API_KEY: "test-key-not-real"
          GOOGLE_API_KEY: "test-key-not-real"
          OPENAI_API_KEY: "test-key-not-real"
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            --cov=realize_core \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -m "not slow and not integration"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────
  # Job 3: Security Scan
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety and bandit
        run: pip install safety bandit[toml]

      - name: Check dependencies for vulnerabilities (safety)
        run: safety check -r requirements.txt --output text || true
        # Non-blocking: log vulnerabilities but don't fail CI yet
        # Remove `|| true` once all deps are clean

      - name: Run bandit security linter
        run: |
          bandit -r realize_core/ realize_api/ \
            -c pyproject.toml \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

      - name: Scan for hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --verbose

  # ──────────────────────────────────────────────
  # Job 4: Docker Build (verify Dockerfile builds)
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 5: Dashboard lint + build
  # ──────────────────────────────────────────────
  dashboard-check:
    name: Dashboard Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: dashboard
        run: pnpm lint

      - name: Build
        working-directory: dashboard
        run: pnpm build

  # ──────────────────────────────────────────────
  # Job 6: npm CLI lint + build (when CLI exists)
  # ──────────────────────────────────────────────
  cli-check:
    name: CLI Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: realize-os-cli/package-lock.json

      - name: Install dependencies
        working-directory: realize-os-cli
        run: npm ci

      - name: Lint
        working-directory: realize-os-cli
        run: npm run lint --if-present

      - name: Build
        working-directory: realize-os-cli
        run: npm run build

      - name: Test
        working-directory: realize-os-cli
        run: npm test --if-present
